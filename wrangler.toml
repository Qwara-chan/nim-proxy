name = "nim-proxy"
main = "src/index.ts"
compatibility_date = "2024-09-23"

# Secrets (NIM_API_KEYS, PROXY_AUTH_TOKEN) MUST be configured via:
#   wrangler secret put NIM_API_KEYS
#   wrangler secret put PROXY_AUTH_TOKEN
# Do NOT put them here.

[vars]
NIM_BASE_URL = "https://integrate.api.nvidia.com/v1"
NIM_MAX_RETRIES = "3"
NIM_KEY_COOLDOWN = "60"
NIM_LOG_LEVEL = "info"
NIM_REQUEST_TIMEOUT = "30000"
NIM_ALLOWED_MODELS = ""